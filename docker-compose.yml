services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull the model on first start
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull qwen2.5:7b && wait"]

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_OLLAMA_BASE_URL=http://ollama:11434
      - APP_OLLAMA_MODEL=qwen2.5:7b
    depends_on:
      - ollama
    volumes:
      - ./app:/app/app  # Hot reload source files

volumes:
  ollama_data:
